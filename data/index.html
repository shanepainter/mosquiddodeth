<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MosquiddoDeth">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" href="/icon-512.png">
<title>MosquiddoDeth</title>
<style>
:root {
  --bg: #0d1117;
  --card: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --muted: #8b949e;
  --green: #3fb950;
  --red: #f85149;
  --blue: #58a6ff;
  --orange: #d29922;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 16px;
  padding-top: env(safe-area-inset-top, 16px);
  max-width: 500px;
  margin: 0 auto;
  -webkit-user-select: none;
  user-select: none;
}
.logo { display: block; max-width: 280px; height: auto; margin: 0 auto 4px; }
.device-name { text-align: center; color: var(--muted); font-size: 0.85em; margin-bottom: 16px; }
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
}
.card h2 { font-size: 0.85em; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
.status-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.status-row:last-child { margin-bottom: 0; }
.status-label { color: var(--muted); font-size: 0.9em; }
.status-value { font-weight: 600; }
.active { color: var(--green); }
.inactive { color: var(--muted); }

/* Buttons */
.btn {
  display: block;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  font-size: 1em;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.1s, opacity 0.15s;
  -webkit-tap-highlight-color: transparent;
  margin-bottom: 8px;
}
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.5; }
.btn-green { background: var(--green); color: #000; }
.btn-red { background: var(--red); color: #fff; }
.btn-blue { background: var(--blue); color: #000; }
.btn-outline { background: none; border: 1px solid var(--border); color: var(--text); }
.btn-sm { padding: 8px 16px; font-size: 0.9em; width: auto; display: inline-block; }

/* Run All button */
.run-all-btn { margin-bottom: 12px; }

/* Zone tabs */
.zone-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 12px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.zone-tab {
  flex-shrink: 0;
  padding: 8px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--muted);
  font-size: 0.85em;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}
.zone-tab.selected { background: var(--blue); color: #000; border-color: var(--blue); }
.zone-tab.zone-active { border-color: var(--green); }
.zone-tab.zone-active::after {
  content: '';
  position: absolute;
  top: 4px;
  right: 4px;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
}
.zone-tab.zone-queued { border-color: var(--orange); }

/* Zone panel */
.zone-panel { display: none; }
.zone-panel.visible { display: block; }
.countdown {
  font-size: 2em;
  font-weight: 700;
  text-align: center;
  font-variant-numeric: tabular-nums;
  color: var(--green);
  margin: 8px 0;
}
.queued-badge {
  text-align: center;
  color: var(--orange);
  font-weight: 600;
  font-size: 0.9em;
  margin: 8px 0;
}

/* Inputs */
.field-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.field-row:last-child { margin-bottom: 0; }
.field-row input[type="number"],
.field-row input[type="text"] {
  padding: 8px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg);
  color: var(--text);
  font-size: 1em;
  text-align: center;
}
.field-row input[type="text"] { text-align: left; }
.field-row input[type="number"] { width: 80px; }

/* Schedule */
.schedule-entry {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 8px;
}
.schedule-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.schedule-time {
  display: flex;
  gap: 4px;
  align-items: center;
  margin-bottom: 8px;
}
.schedule-time input {
  width: 60px;
  padding: 6px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--card);
  color: var(--text);
  font-size: 1em;
  text-align: center;
}
.day-pills { display: flex; gap: 4px; flex-wrap: wrap; }
.day-pill {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--muted);
  font-size: 0.75em;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.15s;
}
.day-pill.on { background: var(--blue); color: #fff; border-color: var(--blue); }
.toggle {
  width: 44px;
  height: 24px;
  border-radius: 12px;
  background: var(--border);
  position: relative;
  cursor: pointer;
  transition: background 0.2s;
  flex-shrink: 0;
}
.toggle.on { background: var(--green); }
.toggle::after {
  content: '';
  position: absolute;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: #fff;
  top: 2px;
  left: 2px;
  transition: transform 0.2s;
}
.toggle.on::after { transform: translateX(20px); }
.remove-btn {
  background: none;
  border: none;
  color: var(--red);
  font-size: 1.2em;
  cursor: pointer;
  padding: 0 4px;
}
.add-btn {
  display: block;
  width: 100%;
  padding: 10px;
  border: 1px dashed var(--border);
  border-radius: 8px;
  background: none;
  color: var(--blue);
  font-size: 0.85em;
  cursor: pointer;
}

/* Devices */
.device-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 6px;
  text-decoration: none;
  color: var(--text);
  transition: border-color 0.15s;
}
.device-item:active { border-color: var(--blue); }
.device-item.current { border-color: var(--blue); border-width: 2px; }
.device-item .dev-label { font-weight: 600; font-size: 0.95em; }
.device-item .dev-sub { font-size: 0.8em; color: var(--muted); }
.device-item .dev-status { font-size: 0.8em; font-weight: 600; }

.meta { font-size: 0.8em; color: var(--muted); text-align: center; margin-top: 16px; }
</style>
</head>
<body>
<img src="/logo.png" alt="MosquiddoDeth" class="logo">
<div class="device-name" id="device-name"></div>

<div class="card" id="status-card">
  <h2>Status</h2>
  <div class="status-row">
    <span class="status-label">Active</span>
    <span class="status-value" id="active-status">--</span>
  </div>
  <div class="status-row">
    <span class="status-label">Queue</span>
    <span class="status-value" id="queue-status">--</span>
  </div>
  <div class="status-row">
    <span class="status-label">WiFi</span>
    <span class="status-value" id="wifi-rssi">--</span>
  </div>
  <div class="status-row">
    <span class="status-label">Time</span>
    <span class="status-value" id="device-time">--</span>
  </div>
</div>

<button class="btn btn-blue run-all-btn" onclick="runAll()">RUN ALL ZONES</button>

<div class="zone-tabs" id="zone-tabs"></div>
<div id="zone-panels"></div>

<div class="card">
  <h2>Device Name</h2>
  <div class="field-row">
    <input type="text" id="name-input" maxlength="32" placeholder="e.g. Back Patio" style="width:160px;">
    <button class="btn btn-sm btn-outline" onclick="saveName()">Save</button>
  </div>
</div>

<div class="card">
  <h2>PIN Lock</h2>
  <div id="pin-status" style="font-size:0.9em;margin-bottom:10px;color:var(--muted)">--</div>
  <div class="field-row">
    <input type="text" id="pin-input" maxlength="4" inputmode="numeric" pattern="[0-9]*" placeholder="4 digits" style="width:80px;">
    <button class="btn btn-sm btn-outline" onclick="setPin()">Set PIN</button>
    <button class="btn btn-sm btn-outline" onclick="clearPin()" style="color:var(--red)">Remove</button>
  </div>
</div>

<div class="card" id="devices-card">
  <h2>All Sprayers</h2>
  <div id="devices-container"></div>
</div>

<div class="meta" id="uptime"></div>

<script>
const DAYS = ['Su','Mo','Tu','We','Th','Fr','Sa'];
let state = {};
let selectedZone = 0;
let pollTimer = null;
let sessionPin = sessionStorage.getItem('pin') || '';

function promptPin() {
  const p = prompt('Enter 4-digit PIN:');
  if (p && p.length === 4) {
    sessionPin = p;
    sessionStorage.setItem('pin', p);
    return true;
  }
  return false;
}

async function api(path, body, retry) {
  const headers = {'Content-Type':'application/json'};
  if (sessionPin) headers['X-Pin'] = sessionPin;
  if (body !== undefined && sessionPin) body.pin = sessionPin;
  const opts = body !== undefined
    ? { method: 'POST', headers, body: JSON.stringify(body) }
    : { method: 'GET', headers };
  try {
    const r = await fetch('/api' + path, opts);
    if (r.status === 403 && !retry) {
      if (promptPin()) return api(path, body, true);
      return null;
    }
    const d = await r.json();
    if (d.error === 'pin_required' && !retry) {
      if (promptPin()) return api(path, body, true);
      return null;
    }
    updateUI(d);
    return d;
  } catch(e) { console.error(e); }
}

function updateUI(d) {
  if (!d || !d.zones) return;
  state = d;

  // Device identity
  const nameEl = document.getElementById('device-name');
  const label = d.friendly_name || d.hostname || '';
  const sub = d.friendly_name ? `${d.hostname}.local` : '';
  nameEl.textContent = sub ? `${label} (${sub})` : `${label}.local`;
  document.title = (d.friendly_name || 'MosquiddoDeth');

  // Name input
  const nameInput = document.getElementById('name-input');
  if (document.activeElement !== nameInput) nameInput.value = d.friendly_name || '';

  // Active zone status
  const activeEl = document.getElementById('active-status');
  if (d.active_zone >= 0) {
    const z = d.zones[d.active_zone];
    activeEl.textContent = z.name + ' (' + z.remaining + 's)';
    activeEl.className = 'status-value active';
    setPollRate(1000);
  } else {
    activeEl.textContent = 'Idle';
    activeEl.className = 'status-value inactive';
    setPollRate(5000);
  }

  // Queue
  const qEl = document.getElementById('queue-status');
  qEl.textContent = d.queue_size > 0 ? d.queue_size + ' waiting' : 'Empty';
  qEl.style.color = d.queue_size > 0 ? 'var(--orange)' : 'var(--muted)';

  // WiFi
  const rssi = d.wifi_rssi || 0;
  const rssiEl = document.getElementById('wifi-rssi');
  rssiEl.textContent = rssi + ' dBm';
  rssiEl.style.color = rssi > -60 ? 'var(--green)' : rssi > -75 ? 'var(--orange)' : 'var(--red)';

  // Time
  document.getElementById('device-time').textContent = d.time || '--';

  // PIN
  const pinStatusEl = document.getElementById('pin-status');
  pinStatusEl.textContent = d.pin_enabled ? 'PIN is set' : 'No PIN set';
  pinStatusEl.style.color = d.pin_enabled ? 'var(--green)' : 'var(--orange)';

  // Uptime
  if (d.uptime !== undefined) {
    const h = Math.floor(d.uptime / 3600);
    const m = Math.floor((d.uptime % 3600) / 60);
    document.getElementById('uptime').innerHTML = `${d.hostname || ''} · ${d.ip || ''} · Uptime: ${h}h ${m}m` +
      (d.version ? ` · v${d.version} · <a href="/update" style="color:var(--blue)">Update</a>` : '');
  }

  renderZoneTabs(d.zones);
  renderZonePanel(d.zones, selectedZone);
}

function renderZoneTabs(zones) {
  const container = document.getElementById('zone-tabs');
  container.innerHTML = '';
  zones.forEach((z, i) => {
    const tab = document.createElement('div');
    tab.className = 'zone-tab';
    if (i === selectedZone) tab.classList.add('selected');
    if (z.active) tab.classList.add('zone-active');
    if (z.queued) tab.classList.add('zone-queued');
    tab.textContent = z.name;
    tab.onclick = () => { selectedZone = i; renderZoneTabs(zones); renderZonePanel(zones, i); };
    container.appendChild(tab);
  });
}

function renderZonePanel(zones, idx) {
  const container = document.getElementById('zone-panels');
  container.innerHTML = '';
  if (idx >= zones.length) return;
  const z = zones[idx];

  const panel = document.createElement('div');
  panel.className = 'zone-panel visible';

  // Countdown / status
  if (z.active) {
    const cd = document.createElement('div');
    cd.className = 'countdown';
    cd.textContent = z.remaining + 's';
    panel.appendChild(cd);
  }
  if (z.queued) {
    const qb = document.createElement('div');
    qb.className = 'queued-badge';
    qb.textContent = 'QUEUED';
    panel.appendChild(qb);
  }

  // Start / Stop button
  const btn = document.createElement('button');
  if (z.active) {
    btn.className = 'btn btn-red';
    btn.textContent = 'STOP ' + z.name.toUpperCase();
    btn.onclick = () => api('/zone/stop', { zone: idx });
  } else {
    btn.className = 'btn btn-green';
    btn.textContent = 'SPRAY ' + z.name.toUpperCase();
    btn.onclick = () => api('/zone/start', { zone: idx });
  }
  panel.appendChild(btn);

  // Zone config card
  const cfgCard = document.createElement('div');
  cfgCard.className = 'card';
  cfgCard.innerHTML = '<h2>Zone Settings</h2>';

  const nameRow = document.createElement('div');
  nameRow.className = 'field-row';
  const nameIn = document.createElement('input');
  nameIn.type = 'text';
  nameIn.maxLength = 24;
  nameIn.value = z.name;
  nameIn.style.width = '140px';
  nameIn.placeholder = 'Zone name';
  const durIn = document.createElement('input');
  durIn.type = 'number';
  durIn.min = 1;
  durIn.max = 600;
  durIn.value = z.seconds;
  const durLabel = document.createElement('span');
  durLabel.className = 'status-label';
  durLabel.textContent = 'sec';
  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn btn-sm btn-outline';
  saveBtn.textContent = 'Save';
  saveBtn.onclick = () => {
    api('/zone/config', {
      zone: idx,
      name: nameIn.value.trim() || z.name,
      seconds: parseInt(durIn.value) || z.seconds
    });
  };
  nameRow.appendChild(nameIn);
  nameRow.appendChild(durIn);
  nameRow.appendChild(durLabel);
  nameRow.appendChild(saveBtn);
  cfgCard.appendChild(nameRow);

  const gpioNote = document.createElement('div');
  gpioNote.style.cssText = 'font-size:0.8em;color:var(--muted);margin-top:8px';
  gpioNote.textContent = 'GPIO ' + z.pin;
  cfgCard.appendChild(gpioNote);

  panel.appendChild(cfgCard);

  // Schedules card
  const schedCard = document.createElement('div');
  schedCard.className = 'card';
  schedCard.innerHTML = '<h2>Schedules</h2>';

  const schedContainer = document.createElement('div');
  renderSchedules(schedContainer, z.schedules || [], idx);
  schedCard.appendChild(schedContainer);

  const addBtn = document.createElement('button');
  addBtn.className = 'add-btn';
  addBtn.textContent = '+ Add Schedule';
  addBtn.onclick = () => {
    const scheds = z.schedules || [];
    if (scheds.length >= 4) return;
    scheds.push({ enabled: true, days: 0b0100100, hour: 6, minute: 0 });
    z.schedules = scheds;
    saveZoneSchedules(idx, scheds);
  };
  schedCard.appendChild(addBtn);
  panel.appendChild(schedCard);

  container.appendChild(panel);
}

function renderSchedules(container, scheds, zoneIdx) {
  container.innerHTML = '';
  scheds.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'schedule-entry';

    const header = document.createElement('div');
    header.className = 'schedule-header';
    const toggle = document.createElement('div');
    toggle.className = 'toggle' + (s.enabled ? ' on' : '');
    toggle.onclick = () => { s.enabled = !s.enabled; saveZoneSchedules(zoneIdx, scheds); };
    const removeBtn = document.createElement('button');
    removeBtn.className = 'remove-btn';
    removeBtn.textContent = '\u00d7';
    removeBtn.onclick = () => { scheds.splice(i, 1); saveZoneSchedules(zoneIdx, scheds); };
    header.appendChild(toggle);
    header.appendChild(removeBtn);
    div.appendChild(header);

    const timeRow = document.createElement('div');
    timeRow.className = 'schedule-time';
    const hourIn = document.createElement('input');
    hourIn.type = 'number'; hourIn.min = 0; hourIn.max = 23;
    hourIn.value = String(s.hour).padStart(2, '0');
    hourIn.onchange = () => { s.hour = parseInt(hourIn.value) || 0; saveZoneSchedules(zoneIdx, scheds); };
    const sep = document.createElement('span');
    sep.textContent = ':'; sep.style.color = 'var(--muted)'; sep.style.fontSize = '1.2em';
    const minIn = document.createElement('input');
    minIn.type = 'number'; minIn.min = 0; minIn.max = 59;
    minIn.value = String(s.minute).padStart(2, '0');
    minIn.onchange = () => { s.minute = parseInt(minIn.value) || 0; saveZoneSchedules(zoneIdx, scheds); };
    timeRow.appendChild(hourIn);
    timeRow.appendChild(sep);
    timeRow.appendChild(minIn);
    div.appendChild(timeRow);

    const pills = document.createElement('div');
    pills.className = 'day-pills';
    DAYS.forEach((name, d) => {
      const pill = document.createElement('div');
      pill.className = 'day-pill' + ((s.days & (1 << d)) ? ' on' : '');
      pill.textContent = name;
      pill.onclick = () => { s.days ^= (1 << d); saveZoneSchedules(zoneIdx, scheds); };
      pills.appendChild(pill);
    });
    div.appendChild(pills);
    container.appendChild(div);
  });
}

async function saveZoneSchedules(zoneIdx, scheds) {
  await api('/zone/schedules', { zone: zoneIdx, schedules: scheds });
}

async function runAll() {
  await api('/zone/run-all', {});
}

async function saveName() {
  await api('/config', { friendly_name: document.getElementById('name-input').value.trim() });
}

async function setPin() {
  const v = document.getElementById('pin-input').value.trim();
  if (v.length !== 4 || !/^\d{4}$/.test(v)) { alert('PIN must be exactly 4 digits'); return; }
  const result = await api('/config', { new_pin: v });
  if (result) { sessionPin = v; sessionStorage.setItem('pin', v); document.getElementById('pin-input').value = ''; }
}

async function clearPin() {
  await api('/config', { new_pin: '' });
  sessionPin = '';
  sessionStorage.removeItem('pin');
}

function setPollRate(ms) {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(() => api('/status'), ms);
}

async function loadDevices() {
  try {
    const r = await fetch('/api/devices');
    const d = await r.json();
    renderDevices(d.devices || []);
  } catch(e) { console.error(e); }
}

function renderDevices(devices) {
  const container = document.getElementById('devices-container');
  container.innerHTML = '';
  if (devices.length <= 1) {
    container.innerHTML = '<div style="color:var(--muted);font-size:0.85em;text-align:center;padding:8px">No other sprayers found</div>';
    return;
  }
  devices.forEach(dev => {
    const a = document.createElement('a');
    a.className = 'device-item' + (dev.self ? ' current' : '');
    a.href = dev.self ? '#' : 'http://' + dev.ip;
    const left = document.createElement('div');
    const label = document.createElement('div');
    label.className = 'dev-label';
    label.textContent = dev.name || dev.hostname;
    const sub = document.createElement('div');
    sub.className = 'dev-sub';
    sub.textContent = dev.ip + (dev.self ? ' (this device)' : '');
    left.appendChild(label);
    left.appendChild(sub);
    const status = document.createElement('div');
    status.className = 'dev-status';
    status.textContent = dev.active ? 'ACTIVE' : 'Idle';
    status.style.color = dev.active ? 'var(--green)' : 'var(--muted)';
    a.appendChild(left);
    a.appendChild(status);
    container.appendChild(a);
  });
}

// Init
api('/status');
loadDevices();
setPollRate(5000);
setInterval(loadDevices, 15000);
</script>
</body>
</html>
